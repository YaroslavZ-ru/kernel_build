name: Build CachyOS Kernel
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Setup Arch environment
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman-key --init && pacman-key --populate archlinux
          pacman -S --noconfirm base-devel git ccache fakeroot ncurses bison flex kmod libelf elfutils

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: CachyOS/linux-cachyos
          path: src

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ hashFiles('src/PKGBUILD') }}

      - name: Configure makepkg
        run: |
          echo 'MAKEFLAGS="-j$(nproc)"' >> /etc/makepkg.conf
          echo 'BUILDENV=(fakeroot !distcc color ccache !check !sign)' >> /etc/makepkg.conf

      - name: Build
        working-directory: src
        run: makepkg -s --noconfirm --skippgpcheck

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-cachyos-pkgs
          path: src/*.pkg.tar.zst
