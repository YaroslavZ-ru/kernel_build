name: Build Kernel for Cachy OS (branch 7.0/cachy)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev binutils fakeroot debhelper libdw-dev

      - name: Clone kernel source
        run: git clone --depth=1 -b 7.0/cachy https://github.com/YaroslavZ-ru/linux.git

      - name: Configure kernel
        run: make -C linux x86_64_defconfig

      - name: Build kernel packages
        run: |
          cd linux
          make -j$(nproc) bindeb-pkg

      - name: Install debtap
        run: |
          git clone https://aur.archlinux.org/debtap.git
          cd debtap
          sudo make install
          yes | sudo debtap -u

      - name: Convert to Arch Linux packages
        run: |
          mkdir arch_packages
          for deb in *.deb; do
            echo "Converting $deb ..."
            sudo debtap -q "$deb"
          done
          mv *.pkg.tar.zst arch_packages/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-kernel-packages
          path: arch_packages/*.pkg.tar.zst
