name: Build CachyOS Kernel
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Init keyring & install deps
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm archlinux-keyring base-devel git ccache ncurses bison flex kmod libelf elfutils sudo

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: CachyOS/linux-cachyos
          path: src

      - name: Setup build user
        run: |
          useradd -m builduser
          echo 'builduser ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builduser
          chown -R builduser:builduser $GITHUB_WORKSPACE

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /home/builduser/.cache/ccache
          key: ccache-${{ hashFiles('src/PKGBUILD') }}

      - name: Build
        run: |
          su - builduser -c "
            export MAKEFLAGS='-j\$(nproc)'
            export CCACHE_DIR=\$HOME/.cache/ccache
            cd src
            makepkg -s --noconfirm --skippgpcheck --noprogressbar
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-cachyos-pkgs
          path: src/*.pkg.tar.zst
