name: Build Kernel with ROCm LLVM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install base dependencies and add ROCm repo
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg2 software-properties-common
          wget -q -O - https://repo.radeon.com/rocm/rocm.gpg.key | sudo apt-key add -
          echo "deb [arch=amd64] https://repo.radeon.com/rocm/apt/latest ubuntu main" | sudo tee /etc/apt/sources.list.d/rocm.list
          sudo apt-get update

      - name: Install ROCm LLVM and kernel build deps
        run: |
          sudo apt-get install -y rocm-llvm-alt build-essential libncurses-dev bison flex libssl-dev libelf-dev binutils fakeroot debhelper libdw-dev

      - name: Clone kernel source
        run: git clone --depth=1 -b 7.0/cachy https://github.com/YaroslavZ-ru/linux.git

      - name: Configure kernel
        run: make -C linux x86_64_defconfig

      - name: Build kernel with ROCm Clang
        run: |
          cd linux
          # Добавляем путь к ROCm LLVM в PATH
          export PATH=/opt/rocm/llvm/bin:$PATH
          export CC=clang
          export LD=ld.lld
          make LLVM=1 -j$(nproc) bindeb-pkg

      - name: Install debtap
        run: |
          git clone https://aur.archlinux.org/debtap.git
          cd debtap
          sudo make install
          yes | sudo debtap -u

      - name: Convert to Arch Linux packages
        run: |
          mkdir arch_packages
          for deb in *.deb; do
            echo "Converting $deb ..."
            sudo debtap -q "$deb"
          done
          mv *.pkg.tar.zst arch_packages/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-kernel-rocm-llvm
          path: arch_packages/*.pkg.tar.zst
