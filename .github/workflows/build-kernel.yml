name: Build Kernel with AOCC (via asdf)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # Освобождаем место
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/az /opt/hostedtoolcache
          sudo docker system prune -af || true
          sudo apt-get clean
          df -h /

      # Базовые зависимости для сборки ядра и asdf
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev binutils fakeroot debhelper libdw-dev wget git

      # Устанавливаем asdf
      - name: Install asdf
        run: |
          git clone https://github.com/asdf-vm/asdf.git ~/.asdf --branch v0.14.1
          echo "$HOME/.asdf/shims" >> $GITHUB_PATH
          echo "$HOME/.asdf/bin" >> $GITHUB_PATH

      # Добавляем плагин AOCC и устанавливаем последнюю версию
      - name: Install AOCC via asdf
        run: |
          asdf plugin-add aocc https://github.com/asdf-community/asdf-aocc.git
          # Список версий можно уточнить, но последняя стабильная — 4.0.0
          asdf install aocc 4.0.0
          asdf global aocc 4.0.0
          # Проверяем
          clang --version

      # Клонируем ядро
      - name: Clone kernel source
        run: git clone --depth=1 -b 7.0/cachy https://github.com/YaroslavZ-ru/linux.git

      # Конфигурация ядра
      - name: Configure kernel
        run: make -C linux x86_64_defconfig

      # Сборка с использованием AOCC (clang)
      - name: Build kernel packages with AOCC
        run: |
          cd linux
          export PATH=/home/runner/.asdf/shims:$PATH
          export CC=clang
          export LD=ld.lld
          make LLVM=1 -j$(nproc) bindeb-pkg

      # Установка debtap
      - name: Install debtap
        run: |
          git clone https://aur.archlinux.org/debtap.git
          cd debtap
          sudo install -Dm755 debtap /usr/local/bin/debtap
          sudo install -Dm644 debtap.bash_completion /usr/share/bash-completion/completions/debtap 2>/dev/null || true
          yes | sudo debtap -u

      # Конвертация .deb → .pkg.tar.zst
      - name: Convert to Arch Linux packages
        run: |
          mkdir arch_packages
          for deb in *.deb; do
            echo "Converting $deb ..."
            sudo debtap -q "$deb"
          done
          mv *.pkg.tar.zst arch_packages/ 2>/dev/null || true

      # Выгрузка артефактов
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-kernel-aocc
          path: arch_packages/*.pkg.tar.zst
